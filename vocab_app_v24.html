<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>家庭学習ナビ｜単語フラッシュ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Noto+Serif+JP:wght@400;500;700&family=Nunito:wght@400;600;700;800;900&display=swap');
  :root {
    --bg: #0f0e17; --surface: #1a1927; --card: #22203a;
    --accent: #ff6b6b; --accent2: #ffd166; --accent3: #06d6a0;
    --text: #fffffe; --text-muted: #a7a9be; --radius: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Playfair Display','Noto Serif JP','Nunito',serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body::before { content:''; position:fixed; inset:0; background-image: radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,.3) 0%,transparent 100%), radial-gradient(1px 1px at 80% 10%,rgba(255,255,255,.2) 0%,transparent 100%), radial-gradient(1px 1px at 50% 70%,rgba(255,255,255,.15) 0%,transparent 100%); pointer-events:none; z-index:0; }
  #app { position:relative; z-index:1; }
  .screen { display:none; min-height:100vh; padding:20px; }
  .screen.active { display:flex; flex-direction:column; }

  #home-screen { align-items:center; justify-content:center; gap:32px; padding:40px 24px; }
  .logo-icon { font-size:56px; display:block; margin-bottom:8px; animation:float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .logo-title { font-size:28px; font-weight:900; background:linear-gradient(135deg,var(--accent2),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .logo-sub { font-size:13px; color:var(--text-muted); margin-top:4px; font-family:'Noto Sans JP',sans-serif; }
  .mode-cards { width:100%; max-width:380px; display:flex; flex-direction:column; gap:14px; }
  .mode-card { background:var(--card); border-radius:var(--radius); padding:20px 24px; display:flex; align-items:center; gap:16px; cursor:pointer; border:2px solid transparent; transition:all .25s; }
  .mode-card.flash:hover,.mode-card.flash:active { border-color:var(--accent); }
  .mode-card:active { transform:scale(.97); }
  .mode-icon { font-size:36px; flex-shrink:0; }
  .mode-name { font-size:18px; font-weight:800; margin-bottom:2px; }
  .mode-desc { font-size:12px; color:var(--text-muted); font-family:'Noto Sans JP',sans-serif; }
  .mode-arrow { font-size:20px; color:var(--text-muted); }

  #settings-screen { gap:16px; max-width:440px; margin:0 auto; width:100%; padding-bottom:40px; }
  .screen-header { display:flex; align-items:center; gap:12px; padding:8px 0; }
  .back-btn { width:40px; height:40px; border-radius:12px; background:var(--card); border:none; color:var(--text); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .back-btn:active { background:#2a2845; }
  .screen-title { font-size:20px; font-weight:800; }
  .settings-section { background:var(--card); border-radius:var(--radius); padding:18px; display:flex; flex-direction:column; gap:14px; }
  .settings-label { font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; }
  .source-block { display:flex; flex-direction:column; gap:10px; }
  .source-header { display:flex; align-items:center; gap:10px; }
  .source-checkbox { width:20px; height:20px; accent-color:var(--accent2); cursor:pointer; flex-shrink:0; }
  .source-name { font-size:15px; font-weight:800; flex:1; }
  .source-count { font-size:12px; color:var(--text-muted); }
  .unit-grid { display:flex; flex-wrap:wrap; gap:6px; padding-left:30px; }
  .unit-btn { padding:6px 12px; border-radius:10px; border:2px solid var(--surface); background:var(--surface); color:var(--text-muted); font-size:12px; font-weight:700; font-family:'Nunito',sans-serif; cursor:pointer; transition:all .2s; }
  .unit-btn.active { border-color:var(--accent3); color:var(--accent3); background:rgba(6,214,160,.1); }
  .unit-btn:disabled { opacity:.3; pointer-events:none; }
  .unit-btn.unit-all-btn { border-color:var(--accent2); color:var(--accent2); }
  .unit-btn.unit-all-btn:hover,.unit-btn.unit-all-btn:active { background:rgba(255,209,102,.15); }
  .selected-count { font-size:13px; color:var(--accent2); font-weight:700; text-align:center; padding:4px; font-family:'Noto Sans JP',sans-serif; }
  .priority-btns { display:flex; gap:8px; }
  .priority-btn { flex:1; padding:10px 6px; border-radius:12px; border:2px solid transparent; background:var(--surface); color:var(--text-muted); font-size:12px; font-weight:700; font-family:'Nunito',sans-serif; cursor:pointer; transition:all .2s; text-align:center; }
  .priority-btn.active-all { border-color:var(--accent2); color:var(--accent2); background:rgba(255,209,102,.1); }
  .timer-toggle { display:flex; align-items:center; justify-content:space-between; }
  .toggle-info { flex:1; }
  .toggle-name { font-size:15px; font-weight:700; }
  .toggle-desc { font-size:12px; color:var(--text-muted); font-family:'Noto Sans JP',sans-serif; }
  .toggle-switch { width:52px; height:28px; background:var(--surface); border-radius:14px; position:relative; cursor:pointer; transition:background .3s; border:none; flex-shrink:0; }
  .toggle-switch.on { background:var(--accent3); }
  .toggle-switch::after { content:''; position:absolute; width:22px; height:22px; background:white; border-radius:50%; top:3px; left:3px; transition:left .3s; box-shadow:0 2px 4px rgba(0,0,0,.3); }
  .toggle-switch.on::after { left:27px; }
  .timer-seconds { display:flex; gap:8px; }
  .timer-btn { flex:1; padding:10px; border-radius:12px; border:2px solid var(--surface); background:var(--surface); color:var(--text-muted); font-size:14px; font-weight:700; font-family:'Nunito',sans-serif; cursor:pointer; transition:all .2s; }
  .timer-btn.active { border-color:var(--accent3); color:var(--accent3); background:rgba(6,214,160,.1); }
  .start-btn { width:100%; padding:18px; background:linear-gradient(135deg,var(--accent),#ff4757); border:none; border-radius:var(--radius); color:white; font-size:18px; font-weight:900; font-family:'Nunito',sans-serif; cursor:pointer; transition:transform .15s; box-shadow:0 8px 24px rgba(255,107,107,.4); }
  .start-btn:active { transform:scale(.97); }

  #flash-screen { gap:14px; max-width:440px; margin:0 auto; width:100%; }
  .flash-header { display:flex; align-items:center; gap:12px; }
  .progress-bar-wrap { flex:1; height:6px; background:var(--card); border-radius:3px; overflow:hidden; }
  .progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:3px; transition:width .4s ease; }
  .progress-text { font-size:13px; font-weight:700; color:var(--text-muted); min-width:45px; text-align:right; }
  .timer-display { text-align:center; font-size:13px; font-weight:700; height:20px; }
  .timer-bar { width:100%; height:4px; background:var(--card); border-radius:2px; overflow:hidden; }
  .timer-fill { height:100%; background:var(--accent3); border-radius:2px; transition:width .1s linear,background .3s; }
  .timer-fill.warning { background:var(--accent2); }
  .timer-fill.danger { background:var(--accent); }
  .card-area { flex:1; display:flex; align-items:center; justify-content:center; padding:8px 0; }
  .flashcard { width:100%; background:var(--card); border-radius:24px; padding:32px 28px; text-align:center; position:relative; min-height:200px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; box-shadow:0 20px 60px rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.05); }
  .card-source-badge { position:absolute; top:14px; right:14px; font-size:10px; font-weight:700; padding:3px 10px; border-radius:20px; background:var(--surface); color:var(--text-muted); }
  .priority-dot { position:absolute; top:18px; left:18px; width:10px; height:10px; border-radius:50%; }
  .priority-dot.high { background:#ff6b6b; box-shadow:0 0 8px #ff6b6b; }
  .priority-dot.mid { background:var(--accent2); box-shadow:0 0 8px var(--accent2); }
  .priority-dot.low { background:var(--accent3); box-shadow:0 0 8px var(--accent3); }
  .card-meaning-main { font-size:42px; font-weight:800; color:var(--accent2); font-family:'Noto Sans JP',sans-serif; line-height:1.2; }
  .pos-badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; background:rgba(255,209,102,.15); color:var(--accent2); }
  .card-answer-wrap { display:none; flex-direction:column; align-items:center; gap:6px; animation:fadeIn .3s ease; }
  .card-answer-wrap.visible { display:flex; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .card-word-answer { font-size:38px; font-weight:900; letter-spacing:-.5px; color:var(--text); }
  .card-phonetic { font-size:13px; color:var(--text-muted); font-style:italic; }
  .input-area { background:var(--card); border-radius:var(--radius); padding:16px; display:flex; flex-direction:column; gap:12px; }
  .input-mode-tabs { display:flex; gap:6px; }
  .input-tab { flex:1; padding:8px; border-radius:10px; border:none; background:var(--surface); color:var(--text-muted); font-size:12px; font-weight:700; font-family:'Nunito',sans-serif; cursor:pointer; transition:all .2s; }
  .input-tab.active { background:var(--accent2); color:var(--bg); }
  .letter-boxes { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; min-height:52px; align-items:center; }
  .letter-box { width:36px; height:44px; border-radius:8px; background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800; font-family:'Nunito',sans-serif; border:2px solid var(--surface); transition:all .15s; color:var(--text); }
  .letter-box.correct { background:rgba(6,214,160,.15); border-color:var(--accent3); color:var(--accent3); }
  .letter-box.wrong { background:rgba(255,107,107,.15); border-color:var(--accent); color:var(--accent); }
  .letter-box.empty { color:transparent; }
  .letter-box.cursor { border-color:var(--accent2); }
  .text-input-row { display:flex; gap:8px; margin-top:10px; }
  .text-input-row input { flex:1; padding:12px 16px; background:var(--surface); border:2px solid var(--surface); border-radius:14px; color:var(--text); font-size:18px; font-weight:700; font-family:'Nunito',sans-serif; outline:none; transition:border-color .2s; }
  .text-input-row input:focus { border-color:var(--accent2); }
  .text-input-row button { padding:12px 18px; border-radius:14px; border:none; background:var(--accent2); color:var(--bg); font-size:14px; font-weight:800; font-family:'Nunito',sans-serif; cursor:pointer; white-space:nowrap; }
  .hidden-input { position:absolute; opacity:0; pointer-events:none; width:1px; height:1px; }
  #writing-canvas { width:100%; height:110px; background:var(--surface); border-radius:14px; cursor:crosshair; touch-action:none; display:block; }
  .canvas-actions { display:flex; gap:8px; margin-top:8px; }
  .canvas-btn { flex:1; padding:10px; border-radius:12px; border:none; font-size:13px; font-weight:700; font-family:'Nunito',sans-serif; cursor:pointer; }
  .canvas-btn.clear { background:var(--surface); color:var(--text-muted); }
  .canvas-btn.submit { background:var(--accent2); color:var(--bg); }
  .spellout-display { display:none; text-align:center; padding:10px; background:rgba(6,214,160,.08); border-radius:12px; border:1px solid rgba(6,214,160,.2); }
  .spellout-display.visible { display:block; }
  .spellout-text { font-size:18px; font-weight:800; color:var(--accent3); letter-spacing:4px; }
  .spellout-label { font-size:11px; color:var(--text-muted); margin-top:2px; font-family:'Noto Sans JP',sans-serif; }
  .feedback-area { min-height:36px; display:flex; align-items:center; justify-content:center; gap:8px; font-size:15px; font-weight:700; font-family:'Noto Sans JP',sans-serif; }
  .feedback-area.correct { color:var(--accent3); }
  .feedback-area.wrong { color:var(--accent); }
  .retry-row { display:none; gap:8px; }
  .retry-row.visible { display:flex; }
  .retry-input { flex:1; padding:12px 16px; background:var(--surface); border:2px solid var(--accent); border-radius:14px; color:var(--text); font-size:16px; font-weight:700; font-family:'Nunito',sans-serif; }
  .retry-input:focus { outline:none; }
  .retry-btn { padding:12px 16px; border-radius:14px; border:none; background:var(--accent); color:white; font-size:13px; font-weight:800; font-family:'Nunito',sans-serif; cursor:pointer; white-space:nowrap; }
  .action-row { display:flex; gap:10px; }
  .action-btn { flex:1; padding:14px; border-radius:var(--radius); border:none; font-size:14px; font-weight:800; font-family:'Nunito',sans-serif; cursor:pointer; transition:transform .15s; }
  .action-btn:active { transform:scale(.96); }
  .btn-skip { background:var(--card); color:var(--text-muted); border:2px solid var(--surface); }
  .btn-next { background:linear-gradient(135deg,var(--accent3),#00b894); color:var(--bg); box-shadow:0 6px 20px rgba(6,214,160,.3); }
  .btn-reveal { background:linear-gradient(135deg,var(--accent2),#ffb300); color:var(--bg); box-shadow:0 6px 20px rgba(255,209,102,.3); }


  @media (min-width: 768px) {
    #home-screen { padding: 60px 40px; }
    .mode-cards { max-width: 680px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .mode-card { padding: 24px 28px; }
    .mode-name { font-size: 20px; }
    #home-screen img[alt="家庭学習ナビ"] { max-width: 560px; }
    #settings-screen { max-width: 680px; }
    #flash-screen { max-width: 680px; }
    .flashcard { padding: 48px 40px; min-height: 240px; }
    .card-meaning-main { font-size: 52px; }
    .card-word-answer { font-size: 48px; }
    .text-input-row input { font-size: 22px; padding: 16px 20px; }
    #typing-screen textarea { font-size: 18px; }
  }

  #result-screen { align-items:center; justify-content:center; gap:28px; padding:40px 24px; }
  .result-emoji { font-size:72px; animation:bounce .6s ease; }
  @keyframes bounce { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
  .result-title { font-size:28px; font-weight:900; text-align:center; }
  .result-score-card { background:var(--card); border-radius:var(--radius); padding:28px 32px; text-align:center; width:100%; max-width:320px; }
  .score-big { font-size:64px; font-weight:900; background:linear-gradient(135deg,var(--accent2),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; }
  .score-label { font-size:13px; color:var(--text-muted); margin-top:4px; font-family:'Noto Sans JP',sans-serif; }
  .score-detail { display:flex; gap:20px; justify-content:center; margin-top:16px; padding-top:16px; border-top:1px solid var(--surface); }
  .score-item { text-align:center; }
  .score-num { font-size:22px; font-weight:800; }
  .score-desc { font-size:11px; color:var(--text-muted); font-family:'Noto Sans JP',sans-serif; }
  .score-item.correct .score-num { color:var(--accent3); }
  .score-item.wrong .score-num { color:var(--accent); }
  .score-item.skip .score-num { color:var(--text-muted); }
  .result-actions { display:flex; flex-direction:column; gap:12px; width:100%; max-width:320px; }
  .result-btn { width:100%; padding:16px; border-radius:var(--radius); border:none; font-size:16px; font-weight:800; font-family:'Nunito',sans-serif; cursor:pointer; transition:transform .15s; }
  .result-btn:active { transform:scale(.97); }
  .result-btn.primary { background:linear-gradient(135deg,var(--accent),#ff4757); color:white; box-shadow:0 8px 24px rgba(255,107,107,.35); }
  .result-btn.secondary { background:var(--card); color:var(--text); border:2px solid var(--surface); }
</style>

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h,i) => obj[h.trim()] = (vals[i]||'').trim());
    return obj;
  });
}

function getMabutanNum(w) {
  const s = w['出典_まぶたん'] || '';
  const m = s.match(/No\.(\d+)/);
  return m ? parseInt(m[1]) : 0;
}
function mabutanInGroup(w, group) {
  const num = getMabutanNum(w);
  const [lo, hi] = group.split('-').map(Number);
  return num >= lo && num <= hi;
}
function eikenInGroup(w, group) {
  const s = w['出典_英検5級'] || '';
  const m = s.match(/No\.(\d+)/);
  if (!m) return false;
  const num = parseInt(m[1]);
  const [lo, hi] = group.split('-').map(Number);
  return num >= lo && num <= hi;
}

function buildDeck() {
  const minilaboOn = document.getElementById('chk-minilabo').checked;
  const eikenOn = document.getElementById('chk-eiken').checked;
  const mabutanOn = document.getElementById('chk-mabutan').checked;
  const selectedUnits = Array.from(document.querySelectorAll('#unit-grid button.active')).map(b => b.dataset.unit);
  const selectedEikenGroups = Array.from(document.querySelectorAll('#eiken-grid button.active')).map(b => b.dataset.eiken);
  const selectedMabutanGroups = Array.from(document.querySelectorAll('#mabutan-grid button.active')).map(b => b.dataset.mabutan);
  const result = [];
  if (minilaboOn) MINILABO.filter(w => selectedUnits.includes(w['出典_ミニラボ'])).forEach(w => result.push({...w, _source: 'ミニラボ'}));
  if (eikenOn) EIKEN.filter(w => selectedEikenGroups.some(g => eikenInGroup(w, g))).forEach(w => result.push({...w, _source: '英検5級'}));
  if (mabutanOn) MABUTAN.filter(w => selectedMabutanGroups.some(g => mabutanInGroup(w, g))).forEach(w => result.push({...w, _source: 'まぶたん'}));
  const origEl = document.getElementById('chk-original');
  if (origEl && origEl.checked) {
    loadOriginalWords().forEach(w => result.push({...w, _source: 'オリジナル'}));
  }
  return result.sort(() => Math.random() - 0.5);
}

function loadCard() {
  if (state.current >= state.deck.length) { showResult(); return; }
  const word = state.deck[state.current];
  state.answered = false; state.currentTyped = '';
  const dot = document.getElementById('priority-dot');
  dot.className = 'priority-dot';
  if (word['優先度'] === '🔴') dot.classList.add('high');
  else if (word['優先度'] === '🟡') dot.classList.add('mid');
  else dot.classList.add('low');
  document.getElementById('card-source').textContent = word._source || '';
  document.getElementById('card-meaning-main').textContent = word['意味'];
  document.getElementById('pos-badge').textContent = posLabel(word['品詞']);
  document.getElementById('card-answer-wrap').classList.remove('visible');
  document.getElementById('card-word-answer').textContent = word['単語'];
  document.getElementById('card-phonetic').textContent = word['発音記号'] ? `[${word['発音記号']}]` : '';
  mainInput.value = '';
  mainInput.disabled = false;
  renderEmptyBoxes();
  document.getElementById('spellout-display').classList.remove('visible');
  document.getElementById('feedback-area').className = 'feedback-area';
  document.getElementById('feedback-area').textContent = '';
  clearCanvas();
  document.getElementById('canvas-judge').style.display = 'none';
  const ca = document.querySelector('#canvas-panel .canvas-actions');
  if (ca) ca.style.display = 'flex';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('reveal-btn').style.display = 'block';
  const replayBtn = document.getElementById('replay-btn'); if(replayBtn) replayBtn.style.display='none';
  const pct = (state.current / state.deck.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${state.current+1}/${state.deck.length}`;
  if (state.timerEnabled) startTimer();
  if (state.inputMode === 'keyboard') setTimeout(() => mainInput.focus(), 150);
}

function renderLetterBoxes(typed, correct) {
  const boxes = document.getElementById('letter-boxes');
  boxes.innerHTML = '';
  const maxLen = Math.max(typed.length, correct.length);
  for (let i = 0; i < maxLen; i++) {
    const box = document.createElement('div');
    box.className = 'letter-box';
    const tc = (typed[i] || '').toLowerCase();
    const cc = (correct[i] || '').toLowerCase();
    if (!typed[i]) {
      box.textContent = correct[i]; box.classList.add('wrong');
    } else if (!correct[i]) {
      box.textContent = typed[i]; box.classList.add('wrong');
    } else if (tc === cc) {
      box.textContent = typed[i]; box.classList.add('correct');
    } else {
      box.textContent = typed[i]; box.classList.add('wrong');
    }
    boxes.appendChild(box);
  }
}

function renderEmptyBoxes() {
  const word = state.deck[state.current] ? state.deck[state.current]['単語'] : '';
  const boxes = document.getElementById('letter-boxes');
  boxes.innerHTML = '';
  for (let i = 0; i < word.length; i++) {
    const box = document.createElement('div');
    box.className = 'letter-box empty';
    box.textContent = '_';
    boxes.appendChild(box);
  }
}

function checkAnswer() {
  if (state.answered) return;
  const typed = mainInput.value.trim();
  if (!typed) return;
  const word = state.deck[state.current];
  const correct = word['単語'].toLowerCase();
  stopTimer(); state.answered = true;
  mainInput.disabled = true;
  renderLetterBoxes(typed.toLowerCase(), correct);
  document.getElementById('card-answer-wrap').classList.add('visible');
  const fb = document.getElementById('feedback-area');
  if (typed.toLowerCase() === correct) {
    state.correct++;
    fb.className = 'feedback-area correct'; fb.textContent = '✓ 正解！';
  } else {
    state.wrong++; state.wrongWords.push(word);
    fb.className = 'feedback-area wrong'; fb.textContent = '✗ まちがい！';
  }
  doSpellOut(word['単語']);
  const rb = document.getElementById('replay-btn'); if(rb) rb.style.display='inline-block';
  document.getElementById('next-btn').style.display = 'block';
  document.getElementById('reveal-btn').style.display = 'none';
}

// ===== 音声テスト（詳細デバッグ版）=====
function testVoice() {
  const debug = document.getElementById('voice-debug');
  if (!('speechSynthesis' in window)) {
    debug.textContent = '❌ speechSynthesis 非対応';
    return;
  }
  // まずvoicesを取得
  let voices = window.speechSynthesis.getVoices();
  const enVoices = voices.filter(v => v.lang.startsWith('en'));
  debug.textContent = `voices総数: ${voices.length}\nen系: ${enVoices.map(v=>v.name+'('+v.lang+')').join(', ') || 'なし'}`;

  // voiceschangedを待ってから再試行（Android対策）
  if (voices.length === 0) {
    window.speechSynthesis.onvoiceschanged = () => {
      voices = window.speechSynthesis.getVoices();
      const ev = voices.filter(v => v.lang.startsWith('en'));
      debug.textContent = `[onvoiceschanged後]\nvoices総数: ${voices.length}\nen系: ${ev.map(v=>v.name+'('+v.lang+')').join(', ') || 'なし'}`;
      speakTest(debug, voices);
    };
  } else {
    speakTest(debug, voices);
  }
}

function speakTest(debug, voices) {
  const u = new SpeechSynthesisUtterance('hello');
  u.lang = 'en-US';
  u.rate = 0.8;
  u.volume = 1.0;
  // en-USの音声があれば明示的に指定
  const enVoice = voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en'));
  if (enVoice) {
    u.voice = enVoice;
    debug.textContent += `\n→ 使用音声: ${enVoice.name}`;
  }
  u.onstart = () => { debug.textContent += '\n→ 再生開始 ✅'; };
  u.onend = () => { debug.textContent += '\n→ 完了 ✅'; };
  u.onerror = (e) => { debug.textContent += `\n→ エラー: ${e.error} ❌`; };
  window.speechSynthesis.speak(u);
}

function doSpellOut(word) {
  // スペル表示は常にする
  const letters = word.toUpperCase().split('').join(' - ');
  document.getElementById('spellout-text').textContent = letters;
  document.getElementById('spellout-display').classList.add('visible');

  if (!spelloutEnabled) return;
  if (!('speechSynthesis' in window)) return;

  const rate = spelloutSpeed === 'slow' ? 0.7 : 1.0;
  const letterRate = spelloutSpeed === 'slow' ? 0.55 : 0.85;

  // voicesを取得（Androidは遅延あり）
  function getEnVoice() {
    const voices = window.speechSynthesis.getVoices();
    return voices.find(v => v.lang === 'en-US') ||
           voices.find(v => v.lang.startsWith('en-')) ||
           voices.find(v => v.lang.startsWith('en')) ||
           null;
  }

  // onendチェーンで順番に読む
  function speakChain(items, idx) {
    if (idx >= items.length) return;
    const u = new SpeechSynthesisUtterance(items[idx].text);
    u.lang = 'en-US';
    u.rate = items[idx].rate;
    u.volume = 1.0;
    const v = getEnVoice();
    if (v) u.voice = v;
    u.onend = () => speakChain(items, idx + 1);
    u.onerror = () => speakChain(items, idx + 1); // エラーでもスキップして次へ
    window.speechSynthesis.speak(u);
  }

  function startSpeak() {
    // 単語全体 + 各文字のチェーン
    const items = [
      { text: word, rate: rate },
      ...word.split('').map(ch => ({ text: ch, rate: letterRate }))
    ];
    speakChain(items, 0);
  }

  // voices未ロードならonvoiceschangedを待つ（Android対策）
  const voices = window.speechSynthesis.getVoices();
  if (voices.length === 0) {
    window.speechSynthesis.onvoiceschanged = () => {
      window.speechSynthesis.onvoiceschanged = null;
      startSpeak();
    };
  } else {
    startSpeak();
  }
}

function skipCard() { stopTimer(); state.skipped++; state.current++; loadCard(); }
function nextCard() { stopTimer(); state.current++; loadCard(); }

function startTimer() {
  stopTimer(); state.timerLeft = state.timerSec;
  const bar = document.getElementById('timer-bar');
  const fill = document.getElementById('timer-fill');
  bar.style.display = 'block'; fill.style.width = '100%'; fill.className = 'timer-fill';
  state.timerInterval = setInterval(() => {
    state.timerLeft -= 0.1;
    const pct = (state.timerLeft / state.timerSec) * 100;
    fill.style.width = Math.max(0, pct) + '%';
    if (pct < 30) fill.className = 'timer-fill danger';
    else if (pct < 60) fill.className = 'timer-fill warning';
    document.getElementById('timer-display').textContent = `⏱ ${Math.ceil(state.timerLeft)}秒`;
    if (state.timerLeft <= 0) { stopTimer(); if (!state.answered) revealAnswer(); }
  }, 100);
}

function stopTimer() {
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
  document.getElementById('timer-bar').style.display = 'none';
  document.getElementById('timer-display').textContent = '';
}

function switchInputTab(mode) {
  state.inputMode = mode;
  document.getElementById('tab-keyboard').classList.toggle('active', mode === 'keyboard');
  document.getElementById('tab-canvas').classList.toggle('active', mode === 'canvas');
  document.getElementById('keyboard-panel').style.display = mode === 'keyboard' ? 'block' : 'none';
  document.getElementById('canvas-panel').style.display = mode === 'canvas' ? 'block' : 'none';
  if (mode === 'keyboard') setTimeout(() => focusInput(), 100);
}

const canvas = document.getElementById('writing-canvas');
const ctx = canvas.getContext('2d');
let drawing = false, lastX = 0, lastY = 0;
function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.strokeStyle = '#fffffe'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
}
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
function getPos(e) { const r = canvas.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return {x: t.clientX-r.left, y: t.clientY-r.top}; }
canvas.addEventListener('mousedown', e => { drawing=true; const p=getPos(e); lastX=p.x; lastY=p.y; });
canvas.addEventListener('mousemove', e => { if(!drawing) return; const p=getPos(e); ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(p.x,p.y); ctx.stroke(); lastX=p.x; lastY=p.y; });
canvas.addEventListener('mouseup', () => drawing=false);
canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing=true; const p=getPos(e); lastX=p.x; lastY=p.y; }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); if(!drawing) return; const p=getPos(e); ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(p.x,p.y); ctx.stroke(); lastX=p.x; lastY=p.y; }, {passive:false});
canvas.addEventListener('touchend', () => drawing=false);
function clearCanvas() { const r=canvas.getBoundingClientRect(); ctx.clearRect(0,0,r.width,r.height); }

function showResult() {
  const pct = (state.correct+state.wrong) > 0 ? Math.round((state.correct/(state.correct+state.wrong))*100) : 0;
  document.getElementById('score-pct').textContent = (state.correct+state.wrong) > 0 ? pct+'%' : '-';
  document.getElementById('correct-count').textContent = state.correct;
  document.getElementById('wrong-count').textContent = state.wrong;
  document.getElementById('skip-count').textContent = state.skipped;
  let emoji='😊', title='おつかれさま！';
  if (pct>=90){emoji='🏆';title='完璧！すごい！';}
  else if (pct>=70){emoji='⭐';title='よくできました！';}
  else if (pct>=50){emoji='💪';title='もう少し！';}
  else {emoji='📚';title='もう一度チャレンジ！';}
  document.getElementById('result-emoji').textContent = emoji;

}

function retryWrong() {

}

  // 空ボックスを表示
  renderLearnEmptyBoxes();

  setTimeout(() => startLearnSpellOut(), 600);
}

function renderLearnEmptyBoxes() {
  const word = learnCurrentWord ? learnCurrentWord['単語'] : '';
  const boxes = document.getElementById('learn-letter-boxes');
  boxes.innerHTML = '';
  for (let i = 0; i < word.length; i++) {
    const box = document.createElement('div');
    box.className = 'letter-box empty';
    box.id = 'learn-box-' + i;
    box.textContent = '_';
    boxes.appendChild(box);
  }
}

function startLearnSpellOut() {
  const word = learnCurrentWord['単語'];
  const rate = spelloutSpeed === 'slow' ? 0.7 : 1.0;
  const letterRate = spelloutSpeed === 'slow' ? 0.55 : 0.85;
  const letterDelay = spelloutSpeed === 'slow' ? 700 : 500;

  function getEnVoice() {
    const voices = window.speechSynthesis.getVoices();
    return voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en')) || null;
  }

  function speakAndReveal(items, idx) {
    if (idx >= items.length) {
      // 全部終わったらボタン表示
      document.getElementById('learn-word-display').textContent = word;
      document.getElementById('learn-word-display').style.display = 'block';
      document.getElementById('learn-action-row').style.display = 'flex';
      document.getElementById('learn-next-btn').style.display = 'block';
      document.getElementById('learn-replay-btn').style.display = 'inline-block';
      document.getElementById('learn-status').textContent = '覚えた？';
      return;
    }
    const item = items[idx];
    // ボックスを埋める
    if (item.boxIdx >= 0) {
      const box = document.getElementById('learn-box-' + item.boxIdx);
      if (box) {
        box.textContent = item.letter.toUpperCase();
        box.classList.remove('empty');
        box.classList.add('correct');
      }
    }
    // 音声
    if ('speechSynthesis' in window && spelloutEnabled) {
      const u = new SpeechSynthesisUtterance(item.text);
      u.lang = 'en-US';
      u.rate = item.rate;
      u.volume = 1.0;
      const v = getEnVoice();
      if (v) u.voice = v;
      u.onend = () => setTimeout(() => speakAndReveal(items, idx + 1), 80);
      u.onerror = () => setTimeout(() => speakAndReveal(items, idx + 1), letterDelay);
      window.speechSynthesis.speak(u);
    } else {
      // 音声なしでもアニメだけ動かす
      setTimeout(() => speakAndReveal(items, idx + 1), letterDelay);
    }
  }

  // アイテムリスト: 単語全体 + 各文字
  const items = [
    { text: word, rate: rate, boxIdx: -1, letter: '' },
    ...word.split('').map((ch, i) => ({ text: ch, rate: letterRate, boxIdx: i, letter: ch }))
  ];

  const voices = window.speechSynthesis.getVoices();
  if (voices.length === 0 && 'speechSynthesis' in window) {
    window.speechSynthesis.onvoiceschanged = () => {
      window.speechSynthesis.onvoiceschanged = null;
      speakAndReveal(items, 0);
    };
  } else {
    speakAndReveal(items, 0);
  }
}

function replayLearnSpellOut() {
  renderLearnEmptyBoxes();
  document.getElementById('learn-word-display').style.display = 'none';
  document.getElementById('learn-action-row').style.display = 'none';
  document.getElementById('learn-replay-btn').style.display = 'none';
  document.getElementById('learn-status').textContent = '聞いてスペルを確認しよう';
  setTimeout(() => startLearnSpellOut(), 300);
}

let typingDeck = [];
let typingCurrent = 0;
let typingRevealed = false;
let typingCorrect = 0;
let typingWrong = 0;
let typingSkipped = 0;

function toggleTypingUnit(btn) {
  btn.classList.toggle('active');
  updateTypingSentenceCount();
}

function selectAllTypingUnits() {
  const btns = document.querySelectorAll('[data-typing-unit]');
  const allActive = Array.from(btns).every(b => b.classList.contains('active'));
  btns.forEach(b => { if(allActive) b.classList.remove('active'); else b.classList.add('active'); });
  updateTypingSentenceCount();
}

function updateTypingSentenceCount() {
  const selected = getSelectedTypingUnits();
  const count = SENTENCE_DATA.filter(s => selected.includes(s.unit)).length;
  const el = document.getElementById('typing-sentence-count');
  if (el) el.textContent = count + '文が選択されています';
}

function getSelectedTypingUnits() {
  return Array.from(document.querySelectorAll('[data-typing-unit].active')).map(b => parseInt(b.dataset.typingUnit));
}

function startTypingMode() {
  const selected = getSelectedTypingUnits();
  typingDeck = SENTENCE_DATA.filter(s => selected.includes(s.unit)).sort(() => Math.random() - 0.5);
  if (!typingDeck.length) { alert('文が選択されていません'); return; }
  typingCurrent = 0; typingCorrect = 0; typingWrong = 0; typingSkipped = 0;
  document.getElementById('typing-unit-select').style.display = 'none';
  document.getElementById('typing-quiz-area').style.display = 'flex';
  loadTypingCard();
}

function loadTypingCard() {
  if (typingCurrent >= typingDeck.length) {
    // 結果表示
    document.getElementById('typing-unit-select').style.display = 'flex';
    document.getElementById('typing-quiz-area').style.display = 'none';
    alert('おつかれさま！\n正解: ' + typingCorrect + '  まちがい: ' + typingWrong + '  スキップ: ' + typingSkipped);
    return;
  }
  const s = typingDeck[typingCurrent];
  const pct = (typingCurrent / typingDeck.length) * 100;
  document.getElementById('typing-progress-fill').style.width = pct + '%';
  document.getElementById('typing-progress-text').textContent = (typingCurrent+1) + '/' + typingDeck.length;
  document.getElementById('typing-ja-text').textContent = s.ja;
  document.getElementById('typing-unit-badge').textContent = 'Unit' + s.unit;
  document.getElementById('typing-input').value = '';
  document.getElementById('typing-input').disabled = false;
  document.getElementById('typing-feedback').textContent = '';
  document.getElementById('typing-feedback').style.color = '';
  document.getElementById('typing-answer-display').style.display = 'none';
  document.getElementById('typing-next-btn').style.display = 'none';
  document.getElementById('typing-reveal-btn').style.display = 'block';
  typingRevealed = false;
  const rb = document.getElementById('typing-replay-btn'); if(rb) rb.style.display='none';
  setTimeout(() => document.getElementById('typing-input').focus(), 100);
}

function normalizeTyping(str) {
  return str.trim()
    .toLowerCase()
    .replace(/[""]/g, '"')
    .replace(/['']/g, "'")
    .replace(/—/g, '-')
    .replace(/\s+/g, ' ');
}

function checkTypingAnswer() {
  const input = document.getElementById('typing-input').value;
  if (!input.trim()) return;
  const s = typingDeck[typingCurrent];
  const typed = normalizeTyping(input);
  const correct = normalizeTyping(s.en);
  const fb = document.getElementById('typing-feedback');
  document.getElementById('typing-input').disabled = true;
  document.getElementById('typing-correct-text').textContent = s.en;
  document.getElementById('typing-answer-display').style.display = 'block';
  document.getElementById('typing-next-btn').style.display = 'block';
  document.getElementById('typing-reveal-btn').style.display = 'none';
  const rb = document.getElementById('typing-replay-btn'); if(rb) rb.style.display='inline-block';
  if (typingRevealed) {
    fb.textContent = typed === correct ? '✓ 合ってる！' : 'もう一度確認しよう';
    fb.style.color = typed === correct ? 'var(--accent3)' : 'var(--text-muted)';
  } else if (typed === correct) {
    typingCorrect++;
    fb.textContent = '✓ 正解！'; fb.style.color = 'var(--accent3)';
  } else {
    typingWrong++;
    fb.textContent = '✗ まちがい'; fb.style.color = 'var(--accent)';
  }
  speakSentence(s.en);
}

function typingReveal() {
  const s = typingDeck[typingCurrent];
  typingWrong++;
  typingRevealed = true;
  document.getElementById('typing-correct-text').textContent = s.en;
  document.getElementById('typing-answer-display').style.display = 'block';
  document.getElementById('typing-input').disabled = false;
  document.getElementById('typing-input').value = '';
  document.getElementById('typing-feedback').textContent = '英文を見ながら入力してみよう！';
  document.getElementById('typing-feedback').style.color = 'var(--accent2)';
  document.getElementById('typing-reveal-btn').style.display = 'none';
  const rb = document.getElementById('typing-replay-btn'); if(rb) rb.style.display='inline-block';
  speakSentence(s.en);
  setTimeout(() => document.getElementById('typing-input').focus(), 100);
}

function typingNext() { typingCurrent++; loadTypingCard(); }
function replayTypingSentence() { const s = typingDeck[typingCurrent]; if(s) speakSentence(s.en); }
function typingSkip() { typingSkipped++; typingCurrent++; loadTypingCard(); }

// Enterキーで確認
document.addEventListener('DOMContentLoaded', () => {
  const ta = document.getElementById('typing-input');
  if (ta) {
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        checkTypingAnswer();
      }
    });
  }
});

// 英文読み上げ共通関数
function speakSentence(text, onDone) {
  if (!('speechSynthesis' in window)) { if(onDone) onDone(); return; }
  function getEnVoice() {
    const voices = window.speechSynthesis.getVoices();
    return voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en')) || null;
  }
  function doSpeak() {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.85; u.volume = 1.0;
    const v = getEnVoice(); if(v) u.voice = v;
    u.onend = () => { if(onDone) onDone(); };
    u.onerror = () => { if(onDone) onDone(); };
    window.speechSynthesis.speak(u);
  }
  const voices = window.speechSynthesis.getVoices();
  if (voices.length === 0) {
    window.speechSynthesis.onvoiceschanged = () => {
      window.speechSynthesis.onvoiceschanged = null; doSpeak();
    };
  } else { doSpeak(); }
}

// ===== オリジナル単語機能 =====
const ORIG_KEY = 'vocab_original_words';

function loadOriginalWords() {
  try { return JSON.parse(localStorage.getItem(ORIG_KEY) || '[]'); } catch(e) { return []; }
}
function saveOriginalWords(words) {
  localStorage.setItem(ORIG_KEY, JSON.stringify(words));
  updateOriginalCountLabel();
  renderOrigWordList();
}
function updateOriginalCountLabel() {
  const words = loadOriginalWords();
  const n = words.length;
  const el = document.getElementById('original-count-label');
  if (el) el.textContent = n + '語';
  const el2 = document.getElementById('orig-registered-count');
  if (el2) el2.textContent = n + '語';
  const el3 = document.getElementById('orig-home-count');
  if (el3) el3.textContent = n > 0 ? n + '語登録済み' : '自分の単語を追加する';
}
function renderOrigWordList() {
  const words = loadOriginalWords();
  const list = document.getElementById('orig-word-list');
  const empty = document.getElementById('orig-empty');
  if (!list) return;
  if (words.length === 0) {
    list.innerHTML = '';
    if (empty) empty.style.display = 'block';
    return;
  }
  if (empty) empty.style.display = 'none';
  list.innerHTML = words.map((w, i) => `
    <div style="display:flex;align-items:center;gap:8px;background:var(--surface);border-radius:12px;padding:10px 12px;">
      <span style="font-size:12px;color:var(--text-muted);min-width:18px;">${i+1}</span>
      <span style="font-size:15px;font-weight:800;flex:1;font-family:'Nunito',sans-serif;">${w['単語']}</span>
      <span style="font-size:13px;color:var(--text-muted);flex:1;font-family:'Noto Sans JP',sans-serif;">${w['意味']}</span>
      <span style="font-size:12px;">${w['優先度']||'🟡'}</span>
      <button onclick="deleteOrigWord(${i})" style="background:none;border:none;color:var(--accent);font-size:16px;cursor:pointer;padding:0 4px;">×</button>
    </div>
  `).join('');
}
function deleteOrigWord(idx) {
  const words = loadOriginalWords();
  words.splice(idx, 1);
  saveOriginalWords(words);
}
function clearAllOriginal() {
  if (!confirm('登録済みの単語を全部削除しますか？')) return;
  saveOriginalWords([]);
}

// テキスト貼り付け→整形→プレビュー
let previewWords = [];
function parseAndPreview() {
  const text = document.getElementById('orig-paste-area').value.trim();
  if (!text) { alert('テキストを貼り付けてね！'); return; }
  const lines = text.split(/\n/).map(l => l.trim()).filter(l => l);
  previewWords = [];
  lines.forEach(line => {
    // タブ・全角スペース・半角スペース複数で分割
    const parts = line.split(/\t|\u3000|\s{2,}|(?<=[a-zA-Z'\-\.])\s+(?=[^a-zA-Z])/).map(p => p.trim()).filter(p => p);
    if (parts.length >= 2) {
      const en = parts[0]; const ja = parts.slice(1).join(' ');
      if (/^[a-zA-Z\s'\-\.]+$/.test(en)) {
        previewWords.push({'単語': en.trim().toLowerCase(), '意味': ja, '品詞': '', '優先度': '🟡', '発音記号': ''});
      }
    } else if (parts.length === 1 && /^[a-zA-Z'\-\.]+$/.test(parts[0])) {
      previewWords.push({'単語': parts[0].toLowerCase(), '意味': '', '品詞': '', '優先度': '🟡', '発音記号': ''});
    }
  });
  if (previewWords.length === 0) { alert('読み取れる単語がありませんでした。\n「英語 日本語」の形式で貼り付けてね！'); return; }
  renderPreview();
  showScreen('preview-screen');
}
function renderPreview() {
  const list = document.getElementById('preview-list');
  list.innerHTML = previewWords.map((w, i) => `
    <div style="background:var(--surface);border-radius:14px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;">
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="font-size:11px;color:var(--text-muted);min-width:20px;">${i+1}</span>
        <input value="${w['単語']}" onchange="previewWords[${i}]['単語']=this.value.toLowerCase()" style="flex:1;background:var(--card);border:2px solid var(--surface);border-radius:10px;padding:8px 10px;color:var(--text);font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;outline:none;" onfocus="this.style.borderColor='var(--accent2)'" onblur="this.style.borderColor='var(--surface)'" placeholder="英単語">
        <input value="${w['意味']}" onchange="previewWords[${i}]['意味']=this.value" style="flex:1;background:var(--card);border:2px solid var(--surface);border-radius:10px;padding:8px 10px;color:var(--text);font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;" onfocus="this.style.borderColor='var(--accent2)'" onblur="this.style.borderColor='var(--surface)'" placeholder="意味">
        <button onclick="removePreviewWord(${i})" style="background:none;border:none;color:var(--accent);font-size:18px;cursor:pointer;flex-shrink:0;">×</button>
      </div>
      <div style="display:flex;gap:6px;padding-left:28px;">
        ${['🔴','🟡','🟢'].map(p => `<button onclick="previewWords[${i}]['優先度']='${p}';renderPreview()" style="padding:4px 10px;border-radius:8px;border:2px solid ${w['優先度']===p?'var(--accent2)':'var(--surface)'};background:${w['優先度']===p?'rgba(255,209,102,.15)':'var(--surface)'};color:${w['優先度']===p?'var(--accent2)':'var(--text-muted)'};font-size:13px;cursor:pointer;">${p}</button>`).join('')}
      </div>
    </div>
  `).join('');
}
function removePreviewWord(idx) {
  previewWords.splice(idx, 1);
  renderPreview();
}
function registerPreview() {
  const valid = previewWords.filter(w => w['単語'] && w['意味']);
  if (valid.length === 0) { alert('単語と意味が両方入ってるものがありません！'); return; }
  const merged = [...loadOriginalWords(), ...valid];
  saveOriginalWords(merged);
  document.getElementById('orig-paste-area').value = '';
  previewWords = [];
  alert(valid.length + '語を登録しました！');
  showScreen('original-screen');
}
